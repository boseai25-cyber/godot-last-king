# Game Configuration File
# Adjust these values to tune gameplay

[Game]
# Board dimensions
board_size = 16
tile_size = 1.0

# Player properties
player_starting_willpower = 100
player_max_willpower = 100
player_starting_ammo = 3
player_max_ammo = 3

# Weapon properties
shotgun_range = 3
shotgun_ammo_per_kill = 1
spear_range = 2
spear_willpower_cost = 5

# Hallucination thresholds
hallucination_phase_1_threshold = 75
hallucination_phase_2_threshold = 50
hallucination_phase_3_threshold = 25

# Last Stand properties
last_stand_duration_turns = 3
last_stand_willpower_penalty = 50

# AI difficulty
ai_difficulty = 0  # 0 = Easy, 1 = Normal, 2 = Hard

[Audio]
master_volume = -5.0
music_volume = -10.0
sfx_volume = 0.0
ambient_volume = -15.0

[Visual]
camera_distance = 14.0
camera_height = 12.0
camera_angle = 35.0
enable_particle_effects = true
enable_screen_distortion = true

[Debug]
enable_debug_mode = false
show_piece_ranges = false
show_ai_decisions = false
